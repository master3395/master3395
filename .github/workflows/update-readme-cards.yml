# Generates github-readme-stats SVGs into profile/ (no external Vercel dependency).
# Optional: add repo secret README_STATS_PAT (classic PAT: repo + read:user) for private contributions.
# See: https://github.com/readme-tools/github-readme-stats-action

name: Update README cards

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-readme-cards.yml"
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

concurrency:
  group: readme-cards
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&count_private=true&include_all_commits=true&show_icons=true&theme=dark&icon_color=fff&hide_border=true"
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_PAT || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&count_private=true&include_all_commits=true&show_icons=true&theme=dark&icon_color=fff&hide_border=true"
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_PAT || secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore: update README stat cards"
          git push
